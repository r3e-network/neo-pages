services:
  web:
    build:
      context: .
    command: npm run dev:web:docker
    environment:
      NODE_ENV: development
      NEOPAGES_ROOT_DOMAIN: localhost
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://your-project.supabase.co}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-your-anon-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NEOPAGES_BOOTSTRAP_OWNER_ID: ${NEOPAGES_BOOTSTRAP_OWNER_ID:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_WEBHOOK_TARGET: ${GITHUB_WEBHOOK_TARGET:-http://localhost:3000/api/github/webhook}
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '3000:3000'

  builder:
    build:
      context: .
    command: npm run dev:builder:docker
    environment:
      NODE_ENV: development
      NEOPAGES_ROOT_DOMAIN: localhost
      EDGE_PUBLIC_ORIGIN: http://localhost:8787
      BUILDER_PORT: '4000'
      BUILDER_PUBLIC_URL: http://localhost:4000
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: data/storage
      SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GITHUB_ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      BUILDER_SANDBOX_MODE: ${BUILDER_SANDBOX_MODE:-local}
      BUILDER_POLL_INTERVAL_MS: ${BUILDER_POLL_INTERVAL_MS:-0}
    ports:
      - '4000:4000'
    volumes:
      - ./data/storage:/workspace/data/storage

  gateway:
    build:
      context: .
    command: npm run dev:gateway:docker
    environment:
      NODE_ENV: development
      GATEWAY_PORT: '8787'
      ROOT_DOMAIN: localhost
      DASHBOARD_ORIGIN: http://localhost:3000
      NEOFS_GATEWAY_ORIGIN: http://builder:4000/local-gateway
      SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-anon-key}
      CACHE_TTL_SECONDS: '60'
    depends_on:
      - web
      - builder
    ports:
      - '8787:8787'
